<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>
:root{
    --bg:#0f172a;
    --card:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.1);
    --text:#ffffff;
    --secondary:#94a3b8;
    --accent:#6366f1;
    --accent-hover:#4f46e5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top left,#312e81 0%,transparent 35%),
    radial-gradient(circle at bottom right,#0ea5e9 0%,transparent 35%),
    var(--bg);
}

.calculator{
    width:380px;
    padding:24px;
    border-radius:28px;
    backdrop-filter:blur(20px);
    background:var(--card);
    border:1px solid var(--border);
    box-shadow:
        0 20px 50px rgba(0,0,0,.4),
        inset 0 1px 0 rgba(255,255,255,.1);
}

.display{
    height:120px;
    margin-bottom:20px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);

    display:flex;
    justify-content:flex-end;
    align-items:flex-end;

    color:var(--text);
    font-size:3rem;
    font-weight:700;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    height:70px;
    border:none;
    border-radius:18px;
    cursor:pointer;

    font-size:1.2rem;
    font-weight:600;
    color:white;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);

    transition:.25s ease;
}

button:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.15);
}

button:active{
    transform:scale(.95);
}

.operator{
    background:linear-gradient(
        135deg,
        #6366f1,
        #4f46e5
    );
}

.operator:hover{
    background:linear-gradient(
        135deg,
        #7c3aed,
        #6366f1
    );
}

.equal{
    grid-column:span 2;
    background:linear-gradient(
        135deg,
        #06b6d4,
        #3b82f6
    );
}

.equal:hover{
    filter:brightness(1.1);
}

.clear{
    background:linear-gradient(
        135deg,
        #ef4444,
        #dc2626
    );
}

.top{
    color:var(--secondary);
    font-size:.8rem;
    margin-bottom:10px;
    letter-spacing:1px;
}
</style>
</head>
<body>

<div class="calculator">

    <div class="top">CALCULATOR</div>

    <div class="display">
        0
    </div>

    <div class="buttons">

        <button class="clear">AC</button>
        <button>%</button>
        <button>/</button>
        <button class="operator">÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">×</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">−</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>

        <button>0</button>
        <button>.</button>
        <button class="equal">=</button>

    </div>

</div>
 <script>
const display = document.querySelector(".display");
const buttons = document.querySelectorAll("button");

let currentInput = "";

buttons.forEach(button => {
    button.addEventListener("click", () => {
        const value = button.textContent;

        if (value === "AC") {
            currentInput = "";
            display.textContent = "0";
            return;
        }

        if (value === "=") {
            try {
                currentInput = currentInput
                    .replace(/×/g, "*")
                    .replace(/÷/g, "/");

                currentInput = eval(currentInput).toString();
                display.textContent = currentInput;
            } catch {
                display.textContent = "Error";
                currentInput = "";
            }
            return;
        }

        if (value === "%") {
            try {
                currentInput = (eval(currentInput) / 100).toString();
                display.textContent = currentInput;
            } catch {
                display.textContent = "Error";
            }
            return;
        }

        currentInput += value;
        display.textContent = currentInput;
    });
});
</script>
</body>
</html>
